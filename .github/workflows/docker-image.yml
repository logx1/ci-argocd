name: Docker Image CI

on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build -t logx1/testci:${GITHUB_SHA::7} ./image

    # - name: Install Trivy
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y wget
    #     wget -qO- https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb > trivy.deb
    #     sudo dpkg -i trivy.deb

    # - name: Scan Docker image with Trivy
    #   run: |
    #     trivy image --exit-code 1 --severity HIGH,CRITICAL logx1/testci:${GITHUB_SHA::7}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: docker push logx1/testci:${GITHUB_SHA::7}

    - name: Install yq
      run: |
        sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Update image in deployment.yaml
      run: |
        yq -i '.spec.template.spec.containers[0].image = "logx1/testci:'"${GITHUB_SHA::7}"'"' ./k8s/deployment.yaml

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and push updated deployment.yaml
      run: |
        git add ./k8s/deployment.yaml
        git commit -m "Update image tag in deployment.yaml" || echo "No changes to commit"
        git push