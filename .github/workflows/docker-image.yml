name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build the Docker image
      run: docker build -t logx1/testci:${GITHUB_SHA::7} ./image

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.19.0
      with:
        image-ref: 'logx1/testci:${{ GITHUB_SHA::7 }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: docker push logx1/testci:${GITHUB_SHA::7}

  

    - name: Install yq
      run: |
        sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Update image in deployment.yaml
      run: |
        yq -i '.spec.template.spec.containers[0].image = "logx1/testci:'"${GITHUB_SHA::7}"'"' ./k8s/deployment.yaml

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and push updated deployment.yaml
      run: |
        git add ./k8s/deployment.yaml
        git commit -m "Update image tag in deployment.yaml" || echo "No changes to commit"
        git push