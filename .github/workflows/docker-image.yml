name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r ./image/requirements.txt

    - name: Check Python dependencies for vulnerabilities
      run: |
        pip install pip-audit
        pip-audit -r ./image/requirements.txt

    - name: Lint app.py with flake8
      run: |
        pip install flake8
        flake8 ./image/app.py --max-line-length=120

    - name: Set short SHA
      id: vars
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build the Docker image
      run: docker build -t logx1/testci:${SHORT_SHA} ./image

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.19.0
      with:
        image-ref: 'logx1/testci:${{ env.SHORT_SHA }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: docker push logx1/testci:${SHORT_SHA}

    - name: Install yq
      run: |
        sudo wget -O /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/bin/yq

    - name: Update image in deployment.yaml
      run: |
        yq -i '.spec.template.spec.containers[0].image = "logx1/testci:'"${SHORT_SHA}"'"' ./k8s/deployment.yaml

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Commit and push updated deployment.yaml
      run: |
        git add ./k8s/deployment.yaml
        git commit -m "Update image tag in deployment.yaml" || echo "No changes to commit"
        git push